spring:
  application:
    name: tasf-b2b-backend

  # ── DataSource ─────────────────────────────────────────────────────────────
  datasource:
    url:             ${DB_URL:jdbc:postgresql://localhost:5432/tasfb2b}
    username:        ${DB_USER:tasfb2b}
    password:        ${DB_PASS:tasfb2b}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size:  10

  # ── JPA / Hibernate ────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: false

  sql:
    init:
      mode: never

  # ── Multipart (importación CSV/Excel) ─────────────────────────────────────
  servlet:
    multipart:
      max-file-size:    50MB
      max-request-size: 50MB

# ── Server ─────────────────────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /

# ── Springdoc / Swagger ────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path:              /swagger-ui.html
    operations-sorter: method
    tags-sorter:       alpha
  api-docs:
    path: /api-docs
